site_name: Estimating Knowledge Base
site_description: "Рабочая wiki для estimating: takeoff workflow, COM/EWP rules, QA checklists"
site_author: Estimating Team
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: ru
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Включить тёмный режим
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/weather-night
        name: Включить светлый режим
  font:
    text: Inter
    code: JetBrains Mono
extra_css:
  - assets/stylesheets/extra.css

nav:
  - Главная: index.md

  - Старт:
      - Как пользоваться: start/how-to-use.md
      - Workflow: start/workflow.md
      - Структура takeoff: start/takeoff-structure.md
      - QA checklist: start/quality-checklist.md
      - Правила клиентов: start/client-rules.md
      - Картинки и схемы: start/images-and-schemas.md
      - Preview страницы: start/site-preview.md
      - Поддержка: start/maintenance.md

  - Работа:
      - Типы работ:
          - Residential: work-types/residential.md
          - Reconstruction / Реконструкция: work-types/reconstruction.md
          - COM Commercial: work-types/com.md
          - EWP / Capital: work-types/ewp-capital.md
      - Вертикальные работы:
          - Walls:
              - Sill Plates: work/vertical/walls/sill-plates.md
              - Unit / Interior: work/vertical/walls/unit.md
              - Exterior: work/vertical/walls/exterior.md
              - Corridor: work/vertical/walls/corridor.md
              - Demising: work/vertical/walls/demising.md
              - Gable: work/vertical/walls/gable.md
              - Parapet: work/vertical/walls/parapet.md
              - Shaft: work/vertical/walls/shaft.md
              - Furring: work/vertical/walls/furring.md
              - Corners: work/vertical/walls/corners.md
          - Openings:
              - Windows and Doors: work/vertical/openings/windows-doors.md
              - Headers: work/vertical/openings/headers.md
      - Горизонтальные работы:
          - Floor Framing:
              - Post: work/horizontal/floor-framing/post.md
              - Beam: work/horizontal/floor-framing/beam.md
              - Joist: work/horizontal/floor-framing/joist.md
              - Stair: work/horizontal/floor-framing/stair.md
              - Subfloor: work/horizontal/floor-framing/subfloor.md
              - Details / мелкие элементы:
                  - Rim Board: work/horizontal/floor-framing/details/rim.md
                  - Ribbon Board: work/horizontal/floor-framing/details/ribbon.md
                  - Blocking: work/horizontal/floor-framing/details/blocking.md
                  - Blocking OC: work/horizontal/floor-framing/details/blockingoc.md
                  - Bracing for Drywall: work/horizontal/floor-framing/details/bracingdrywall.md
                  - Bolts: work/horizontal/floor-framing/details/bolts.md
                  - Screws: work/horizontal/floor-framing/details/screws.md
                  - Steel Beam Web Fillers: work/horizontal/floor-framing/details/steelbeams.md
          - Roof Framing:
              - Ridge: work/horizontal/roof-framing/ridge.md
              - Header: work/horizontal/roof-framing/header.md
              - Hip: work/horizontal/roof-framing/hip.md
              - Valley: work/horizontal/roof-framing/valley.md
              - Dormer: work/horizontal/roof-framing/dormer.md
              - Overframes: work/horizontal/roof-framing/overframes.md
              - Dbl / Trpl Rafters: work/horizontal/roof-framing/dbl-trpl-rafters.md
              - Canopy: work/horizontal/roof-framing/canopy.md
      - Sheathing:
          - Wall Sheathing: work/vertical/sheathing/wall-sheathing.md
          - Floor Sheathing: work/vertical/sheathing/floor.md
          - Roof Sheathing: work/horizontal/roof-framing/roof-sheathing.md
          - Gable Sheathing: work/vertical/sheathing/gable.md
          - Box Sheathing: work/vertical/sheathing/box-sheathing.md
          - Truss Heel: work/vertical/sheathing/truss-heel.md
          - Shear Wall: work/vertical/sheathing/shear-wall.md
      - Roof Misc / прочее:
          - Eve: work/sheathing-and-misc/eve.md
          - Rake: work/sheathing-and-misc/rake.md
          - Returns: work/sheathing-and-misc/returns.md
          - Roof Types: work/sheathing-and-misc/rooftype.md
          - Ridge / Valley / Hip: work/sheathing-and-misc/ridgevalleyhip.md
          - Flashing: work/sheathing-and-misc/flashing.md
      - SQFTs:
          - Basement: work/sqfts/basement.md
          - 1st-5th Floors: work/sqfts/1st2nd.md
          - Loft: work/sqfts/loft.md
          - Roof: work/sqfts/roof.md
          - Deck: work/sqfts/deck.md
          - Porch: work/sqfts/porch.md
          - Balcony: work/sqfts/balcony.md
          - Cantilevered: work/sqfts/cantilevered.md
      - Deck / Porch / Balcony:
          - Railing: work/deck/railing.md
          - Balcony Trims: work/deck/balcony-trims.md
          - Anchor Bolts: work/deck/anchor-bolts.md
      - Interior Trims:
          - Обзор: work/interior-trims/overview.md
          - Base: work/interior-trims/base.md
          - Casing: work/interior-trims/casing.md
          - Crown: work/interior-trims/crown.md
          - Door and Window Trim: work/interior-trims/door-window-trim.md
          - Room Schedule: work/interior-trims/room-schedule.md
      - Exterior Trims:
          - Обзор: work/exterior-trims/overview.md
          - Exclusions и J-Channel: work/exterior-trims/exclusions.md
          - Casing, Corner & Band: work/exterior-trims/casing-corner-band.md
          - Furring & Window Jambs: work/exterior-trims/furring-and-jambs.md
          - Soffit & Fascia: work/exterior-trims/soffit-fascia.md
          - Porch / Deck / Balcony: work/exterior-trims/porch-deck-balcony.md
          - Rails & Decking: work/exterior-trims/rails-decking.md
          - Balcony build-up: work/exterior-trims/balcony-buildup.md
          - Outdoor Shower & Pergola: work/exterior-trims/shower-pergola.md
          - Trim macros: work/exterior-trims/macros.md
      - Siding:
          - Обзор: work/siding/overview.md
          - Типы siding: work/siding/types.md
          - Underlayment: work/siding/underlayment.md
          - EIFS / Stucco / Veneer: work/siding/eifs-stucco-veneer.md
          - Измерение: work/siding/measure.md

  - Справочник:
      - Советы и важные вещи: reference/boss-feedback-rules.md
      - Как называть takeoffs: reference/takeoff-naming.md
      - OurPlaneCore — программа: reference/ourplanecore.md
      - Hangers: reference/hangers.md
      - Material catalog: reference/material-catalog.md
      - Standard notes: reference/standard-notes.md
      - Takeoff item labels: reference/takeoff-items.md
      - Excel macro hotkeys: reference/excel-hotkeys.md
      - Формулы и факторы: reference/formulas.md

plugins:
  - search:
      lang:
        - en
        - ru

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Прямая ссылка на раздел
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false
