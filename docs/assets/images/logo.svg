<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="L4d">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b2a4a"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/></linearGradient>
    <clipPath id="sq"><rect width="128" height="128" rx="30"/></clipPath>
    <clipPath id="top"><rect x="46" y="24" width="58" height="58" rx="13"/></clipPath>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#04121f" flood-opacity="0.4"/></filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <g>
    <g filter="url(#drop)"><rect x="28" y="46" width="58" height="58" rx="13" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5"/></g>
    <g filter="url(#drop)"><rect x="37" y="35" width="58" height="58" rx="13" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/></g>
    <g filter="url(#drop)"><rect x="46" y="24" width="58" height="58" rx="13" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2"/></g>
  </g>
  <g clip-path="url(#top)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1">
    <line x1="58" y1="24" x2="58" y2="82"/><line x1="70" y1="24" x2="70" y2="82"/><line x1="82" y1="24" x2="82" y2="82"/><line x1="94" y1="24" x2="94" y2="82"/>
    <line x1="46" y1="36" x2="104" y2="36"/><line x1="46" y1="48" x2="104" y2="48"/><line x1="46" y1="60" x2="104" y2="60"/><line x1="46" y1="72" x2="104" y2="72"/>
  </g>
  <g clip-path="url(#sq)"><path d="M52 30 L70 24 L60 36 Z" fill="#ffffff" opacity="0.22"/></g>
  <!-- trace + measured node target -->
  <g filter="url(#glow)">
    <polyline points="58,72 70,48 94,60" fill="none" stroke="#c6ff3d" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="58" cy="72" r="5.2" fill="#c6ff3d"/>
    <circle cx="70" cy="48" r="3.8" fill="#0b2a4a" stroke="#c6ff3d" stroke-width="2.4"/>
    <!-- measured target node at end -->
    <circle cx="94" cy="60" r="9" fill="none" stroke="#c6ff3d" stroke-width="3.4"/>
    <circle cx="94" cy="60" r="2.6" fill="#c6ff3d"/>
  </g>
  <rect x="0.75" y="0.75" width="126.5" height="126.5" rx="29.25" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
</svg>
