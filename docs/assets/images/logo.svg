<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Knowledge Base">
  <defs>
    <radialGradient id="bg" cx="0.4" cy="0.62" r="0.98">
      <stop offset="0" stop-color="#c79256"/>
      <stop offset="0.6" stop-color="#8a5a30"/>
      <stop offset="1" stop-color="#54331a"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.16" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sq"><circle cx="64" cy="64" r="62"/></clipPath>
    <filter id="warp" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.026" numOctaves="5" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.4" flood-color="#2a1505" flood-opacity="0.5"/>
    </filter>
  </defs>

  <circle cx="64" cy="64" r="62" fill="url(#bg)" opacity="0.6"/>
  <g clip-path="url(#sq)" opacity="0.6">
    <!-- real old-wood cross-section: chaotic rings, varied thickness, warped -->
    <g fill="none" filter="url(#warp)">
      <ellipse cx="52" cy="80" rx="8"   ry="7"   transform="rotate(8 52 80)"   stroke="#3a2410" stroke-opacity="0.27" stroke-width="2.8"/>
      <ellipse cx="50" cy="82" rx="16"  ry="14"  transform="rotate(-9 50 82)"  stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.0"/>
      <ellipse cx="54" cy="78" rx="22"  ry="20"  transform="rotate(13 54 78)"  stroke="#3a2410" stroke-opacity="0.25" stroke-width="3.7"/>
      <ellipse cx="51" cy="81" rx="31"  ry="27"  transform="rotate(-12 51 81)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.4"/>
      <ellipse cx="53" cy="79" rx="38"  ry="36"  transform="rotate(5 53 79)"   stroke="#3a2410" stroke-opacity="0.23" stroke-width="2.1"/>
      <ellipse cx="49" cy="82" rx="48"  ry="43"  transform="rotate(-15 49 82)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="0.9"/>
      <ellipse cx="55" cy="80" rx="60"  ry="55"  transform="rotate(10 55 80)"  stroke="#3a2410" stroke-opacity="0.22" stroke-width="4.0"/>
      <ellipse cx="51" cy="78" rx="70"  ry="63"  transform="rotate(-4 51 78)"  stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.7"/>
      <ellipse cx="53" cy="81" rx="83"  ry="76"  transform="rotate(12 53 81)"  stroke="#3a2410" stroke-opacity="0.2"  stroke-width="2.5"/>
      <ellipse cx="50" cy="80" rx="98"  ry="90"  transform="rotate(-8 50 80)"  stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.1"/>
      <ellipse cx="54" cy="79" rx="113" ry="104" transform="rotate(6 54 79)"   stroke="#3a2410" stroke-opacity="0.18" stroke-width="3.4"/>
      <ellipse cx="52" cy="82" rx="131" ry="120" transform="rotate(-13 52 82)" stroke="#ffffff" stroke-opacity="0.11" stroke-width="1.3"/>
      <ellipse cx="52" cy="80" rx="152" ry="140" transform="rotate(7 52 80)"   stroke="#3a2410" stroke-opacity="0.16" stroke-width="2.4"/>
      <circle cx="52" cy="80" r="3.2" fill="#3a2410" fill-opacity="0.32"/>
    </g>
    <rect width="128" height="128" fill="url(#sheen)"/>
  </g>
  <circle cx="64" cy="64" r="61.25" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <g filter="url(#ds)">
    <path d="M34 42 H74 M34 42 V90" stroke="#ffffff" stroke-opacity="0.96" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="90" y1="34" x2="90" y2="96" stroke="#ffffff" stroke-opacity="0.72" stroke-width="3.5"
          stroke-linecap="round" stroke-dasharray="0.5 10"/>
    <line x1="64" y1="54" x2="64" y2="82" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
    <g fill="#ffffff"><circle cx="64" cy="52" r="8"/><circle cx="64" cy="84" r="8"/></g>
    <g fill="#22c55e"><circle cx="64" cy="52" r="3.4"/><circle cx="64" cy="84" r="3.4"/></g>
  </g>
</svg>
