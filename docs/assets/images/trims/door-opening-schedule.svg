<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">Interior door and cased opening schedule rules</title>
  <desc id="desc">Diagram showing plan tags, size conversion, and Excel output for interior doors and cased openings.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <style>
      .box{fill:#f8fbf8;stroke:#2e7d32;stroke-width:2;rx:8}
      .text{font-family:Inter,Arial,sans-serif;font-size:18px;fill:#1b1f1d}
      .small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#34423a}
      .wall{stroke:#222;stroke-width:12;fill:none}
      .door{stroke:#ef6c00;stroke-width:4;fill:none}
      .line{stroke:#2e7d32;stroke-width:3;marker-end:url(#arrow)}
      .grid{stroke:#9aa89f;stroke-width:1}
    </style>
  </defs>
  <rect x="28" y="28" width="260" height="292" class="box"/>
  <text x="52" y="66" class="text">Plan tags</text>
  <path d="M92 144 H220" class="wall"/>
  <path d="M145 144 V236" class="door"/>
  <path d="M145 236 A92 92 0 0 0 237 144" class="door"/>
  <text x="86" y="115" class="small">2680</text>
  <text x="86" y="282" class="small">(2)2680, 2680 Pocket,</text>
  <text x="86" y="304" class="small">(2)3080 Slider, 4080 C.O.</text>

  <path d="M310 170 H390" class="line"/>
  <rect x="410" y="28" width="210" height="292" class="box"/>
  <text x="434" y="66" class="text">Convert sizes</text>
  <text x="440" y="112" class="small">2680 = 2'-6\" x 8'-0\"</text>
  <text x="440" y="146" class="small">2'0\" 6'8\" = 24\" x 80\"</text>
  <text x="440" y="180" class="small">Double doors keep qty marker</text>
  <text x="440" y="214" class="small">Use schedule when shown</text>
  <text x="440" y="248" class="small">No shower glass doors</text>

  <path d="M642 170 H722" class="line"/>
  <rect x="742" y="28" width="210" height="292" class="box"/>
  <text x="766" y="66" class="text">Excel output</text>
  <rect x="770" y="95" width="150" height="150" fill="#fff" stroke="#4d5a50" stroke-width="2"/>
  <path d="M770 125 H920 M770 155 H920 M770 185 H920 M770 215 H920 M820 95 V245 M875 95 V245" class="grid"/>
  <text x="782" y="116" class="small">Size</text>
  <text x="832" y="116" class="small">Qty</text>
  <text x="884" y="116" class="small">Note</text>
  <text x="782" y="146" class="small">30x96</text>
  <text x="840" y="146" class="small">2</text>
  <text x="884" y="146" class="small">FR</text>
  <text x="766" y="286" class="small">Check total selected cells</text>
  <text x="766" y="308" class="small">and manufacturer notes.</text>
</svg>
