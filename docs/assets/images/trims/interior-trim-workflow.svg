<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Interior trim takeoff workflow</title>
  <desc id="desc">Workflow from PDF room schedule and plan markup to Excel trim formulas.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <style>
      .box{fill:#f8fbf8;stroke:#2e7d32;stroke-width:2;rx:8}
      .accent{fill:#e8f5e9;stroke:#7cb342;stroke-width:2;rx:8}
      .text{font-family:Inter,Arial,sans-serif;font-size:18px;fill:#1b1f1d}
      .small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#34423a}
      .line{stroke:#2e7d32;stroke-width:3;marker-end:url(#arrow)}
      .orange{stroke:#ef6c00;stroke-width:5;fill:none}
      .wall{stroke:#222;stroke-width:12;fill:none}
      .dash{stroke:#777;stroke-width:2;stroke-dasharray:6 6}
    </style>
  </defs>
  <rect x="24" y="28" width="210" height="128" class="box"/>
  <text x="48" y="68" class="text">1. PDF plans</text>
  <text x="48" y="100" class="small">Create trim PDF sheets</text>
  <text x="48" y="126" class="small">Use finish / room schedules</text>
  <path d="M70 245 H190 V205 H70 Z" class="wall"/>
  <path d="M82 232 H175 V218 H82 Z" class="orange"/>
  <text x="54" y="286" class="small">Trace finish perimeter</text>

  <path d="M250 92 H330" class="line"/>
  <rect x="350" y="28" width="210" height="128" class="accent"/>
  <text x="374" y="68" class="text">2. Measure</text>
  <text x="374" y="100" class="small">Baseboard and crowns</text>
  <text x="374" y="126" class="small">by room perimeter</text>
  <path d="M395 246 H515" class="orange"/>
  <path d="M405 220 V270 M505 220 V270" class="dash"/>
  <text x="386" y="286" class="small">Exclude cabinet / no finish areas</text>

  <path d="M576 92 H656" class="line"/>
  <rect x="676" y="28" width="250" height="128" class="box"/>
  <text x="700" y="68" class="text">3. Excel output</text>
  <text x="700" y="100" class="small">Record formulas, sizes, counts</text>
  <text x="700" y="126" class="small">Check material TBD notes</text>
  <rect x="700" y="205" width="178" height="88" fill="#fff" stroke="#4d5a50" stroke-width="2"/>
  <path d="M700 233 H878 M700 262 H878 M759 205 V293 M820 205 V293" stroke="#9aa89f" stroke-width="1"/>
  <text x="716" y="225" class="small">Base</text>
  <text x="773" y="225" class="small">Crown</text>
  <text x="832" y="225" class="small">Doors</text>
  <text x="716" y="254" class="small">LFT</text>
  <text x="773" y="254" class="small">LFT</text>
  <text x="832" y="254" class="small">EA</text>
</svg>
