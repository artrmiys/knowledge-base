<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="t">
  <title id="t">Balcony build-up assembly stack</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}</style>
  </defs>
  <rect width="760" height="320" fill="#fff"/>
  <text class="t" x="32" y="40">Balcony build-up — полная сборка снизу вверх</text>
  <text class="s" x="32" y="62">posts → beam → ledger/box → joists/hangers → subfloor → sleepers → EPDM → decking.</text>
  <!-- stacked layers -->
  <g stroke="#3a3a3a" stroke-width="1.3">
    <rect x="150" y="240" width="340" height="22" fill="url(#w)"/>
    <rect x="150" y="218" width="340" height="22" fill="url(#w)"/>
    <rect x="150" y="200" width="340" height="18" fill="#eef3f7"/>
    <rect x="170" y="180" width="20" height="20" fill="url(#w)"/><rect x="300" y="180" width="20" height="20" fill="url(#w)"/><rect x="440" y="180" width="20" height="20" fill="url(#w)"/>
    <rect x="150" y="166" width="340" height="14" fill="#3a3a3a"/>
    <rect x="150" y="150" width="340" height="16" fill="#ccd6c9"/>
  </g>
  <line x1="320" y1="158" x2="560" y2="150" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="153">Decking (часто by others)</text>
  <line x1="320" y1="173" x2="560" y2="178" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="181">EPDM membrane</text>
  <line x1="320" y1="190" x2="560" y2="206" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="209">Sleepers (часто 2 слоя)</text>
  <line x1="320" y1="230" x2="560" y2="240" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="243">Subfloor + joists/hangers</text>
  <text class="s" x="150" y="290">Структурный каркас (posts/beam/ledger) — отдельно от trim.</text>
</svg>
