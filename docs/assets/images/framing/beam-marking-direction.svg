<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Mark beams top-down, left-right; keep one direction</title>
  <style>
    .t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
    .s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
    .l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}
    .b{font:700 12px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
    .n{font:700 12px "Segoe UI",Arial,sans-serif;fill:#fff}
  </style>
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="38">Beams: top-down / left-right</text>
  <text class="s" x="32" y="60">Размечай балки в одном направлении и держи его весь run — так длины и опоры не «съедут».</text>

  <!-- plan -->
  <rect x="60" y="90" width="360" height="180" fill="#f4f7f4" stroke="#3a3a3a" stroke-width="1.6"/>
  <!-- beams as horizontal members, marked top to bottom -->
  <g stroke="#3a3a3a" stroke-width="6" stroke-linecap="round">
    <line x1="80" y1="118" x2="400" y2="118"/>
    <line x1="80" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="202" x2="400" y2="202"/>
    <line x1="80" y1="244" x2="400" y2="244"/>
  </g>
  <!-- order badges down the left -->
  <circle cx="80" cy="118" r="10" fill="#2e7d32"/><text class="n" x="76.5" y="122">1</text>
  <circle cx="80" cy="160" r="10" fill="#2e7d32"/><text class="n" x="76.5" y="164">2</text>
  <circle cx="80" cy="202" r="10" fill="#2e7d32"/><text class="n" x="76.5" y="206">3</text>
  <circle cx="80" cy="244" r="10" fill="#2e7d32"/><text class="n" x="76.5" y="248">4</text>
  <!-- direction arrow top-down -->
  <line x1="44" y1="108" x2="44" y2="252" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah2)"/>
  <!-- direction arrow left-right -->
  <line x1="80" y1="280" x2="400" y2="280" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text class="l" x="120" y="296">left → right (вдоль балки)</text>

  <text class="l" x="450" y="118">Длина — до точки опирания</text>
  <text class="s" x="450" y="140">(support to support)</text>
  <text class="b" x="450" y="178">≥ 8' → округлять до 2'</text>
  <text class="s" x="450" y="200">8.4' → 10', 11.2' → 12'</text>
  <text class="b" x="450" y="234">&lt; 8' → без округления</text>
  <text class="s" x="450" y="256">мелкие beams оставляем как есть</text>
</svg>
