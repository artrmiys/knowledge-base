<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Blocking at 48 inch on center</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}.j{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}.d{stroke:#2e7d32;stroke-width:1.3;fill:none;stroke-dasharray:5 4}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Blocking o.c. — раскладка с шагом (обычно 48")</text>
  <text class="s" x="32" y="62">Считается через пролёт: flat ×2, diagonal ×2.5 (см. Формулы).</text>
  <rect x="80" y="110" width="600" height="20" class="j"/>
  <rect x="80" y="160" width="600" height="20" class="j"/>
  <rect x="80" y="210" width="600" height="20" class="j"/>
  <!-- blocking rows at 48 oc -->
  <g fill="#caa27b" stroke="#6c4b2a" stroke-width="1.5">
    <rect x="180" y="130" width="18" height="30"/><rect x="180" y="180" width="18" height="30"/>
    <rect x="360" y="130" width="18" height="30"/><rect x="360" y="180" width="18" height="30"/>
    <rect x="540" y="130" width="18" height="30"/><rect x="540" y="180" width="18" height="30"/>
  </g>
  <line class="d" x1="189" y1="255" x2="369" y2="255"/>
  <text class="l" x="240" y="278">48" o.c.</text>
  <text class="l" x="540" y="120">Blocking rows</text>
</svg>
