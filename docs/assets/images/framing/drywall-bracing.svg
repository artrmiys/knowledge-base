<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">2x4 drywall bracing and ledger on wall</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}.st{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Drywall bracing / ledger — опора гипсу</text>
  <text class="s" x="32" y="62">2x4 там, где стена параллельна framing. Длина по высоте стены.</text>
  <!-- studs -->
  <rect x="150" y="90" width="20" height="180" class="st"/>
  <rect x="240" y="90" width="20" height="180" class="st"/>
  <rect x="330" y="90" width="20" height="180" class="st"/>
  <rect x="420" y="90" width="20" height="180" class="st"/>
  <!-- horizontal bracing/ledger -->
  <rect x="140" y="140" width="310" height="14" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="140" y="210" width="310" height="14" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <line x1="300" y1="147" x2="560" y2="135" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="138">2x4 bracing / ledger</text>
  <line x1="250" y1="200" x2="560" y2="205" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="208">Studs (parallel to framing)</text>
</svg>
