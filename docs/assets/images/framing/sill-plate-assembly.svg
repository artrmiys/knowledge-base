<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="t d">
  <title id="t">Sill plate assembly on foundation</title>
  <desc id="d">Cross-section of a wall sitting on concrete: foundation, sill sealer, termite shield, P.T. sill plate, anchor bolt with washer and nut, wall bottom plate and stud.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#2f7fd6"/></marker>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <pattern id="c" width="9" height="9" patternUnits="userSpaceOnUse"><rect width="9" height="9" fill="#e7e9ec"/><circle cx="2" cy="2" r="0.9" fill="#9aa0a8"/><circle cx="6" cy="6" r="0.9" fill="#9aa0a8"/></pattern>
    <style>
      .ttl{font:700 21px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.sub{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
      .lab{font:600 14px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#566}
      .lead{stroke:#2f7fd6;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="760" height="360" fill="#fff"/>
  <text class="ttl" x="32" y="42">Sill plate — переход бетон → каркас</text>
  <text class="sub" x="32" y="64">На бетоне почти всегда нужны Sill Sealer + Termite Shield + Washers — на плане их нет.</text>

  <!-- foundation -->
  <rect x="150" y="250" width="230" height="80" fill="url(#c)" stroke="#3a3a3a" stroke-width="1.6"/>
  <!-- sill sealer (foam) -->
  <rect x="158" y="240" width="214" height="10" fill="#d9f2d8" stroke="#2f7fd6" stroke-width="1.2"/>
  <!-- termite shield (metal, with bent edge) -->
  <path d="M150,238 H380 l-10,-10 H160 z" fill="#c2cad1" stroke="#3a3a3a" stroke-width="1.3"/>
  <!-- P.T. sill plate -->
  <rect x="168" y="206" width="194" height="22" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <!-- wall bottom plate -->
  <rect x="168" y="184" width="194" height="22" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.4"/>
  <!-- stud -->
  <rect x="250" y="90" width="22" height="94" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.4"/>
  <!-- anchor bolt + washer + nut -->
  <line x1="210" y1="170" x2="210" y2="300" stroke="#3a3a3a" stroke-width="4"/>
  <rect x="198" y="196" width="24" height="8" fill="#7c8a96" stroke="#3a3a3a" stroke-width="1.1"/>
  <rect x="202" y="186" width="16" height="10" fill="#7c8a96" stroke="#3a3a3a" stroke-width="1.1"/>

  <!-- leaders right -->
  <line class="lead" x1="262" y1="120" x2="470" y2="110"/><text class="lab" x="478" y="108">Stud</text>
  <line class="lead" x1="320" y1="194" x2="470" y2="150"/><text class="lab" x="478" y="148">Btm Plate (стена)</text><text class="note" x="478" y="165">лежит на перекрытии, выше sill</text>
  <line class="lead" x1="320" y1="216" x2="470" y2="196"/><text class="lab" x="478" y="194">Sill Plate — 2x6 P.T.</text><text class="note" x="478" y="211">на бетоне; может быть (2)/(3)</text>
  <line class="lead" x1="215" y1="195" x2="470" y2="240"/><text class="lab" x="478" y="238">Anchor bolt + Washer 3x3</text>
  <line class="lead" x1="300" y1="244" x2="470" y2="278"/><text class="lab" x="478" y="276">Sill Sealer (foam, 6")</text>
  <line class="lead" x1="250" y1="233" x2="470" y2="312"/><text class="lab" x="478" y="310">Termite Shield (copper, overlap)</text>

  <!-- leaders left -->
  <line class="lead" x1="260" y1="290" x2="120" y2="300"/><text class="lab" x="20" y="297">Foundation</text>
</svg>
