<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Dropped ceiling soffit framing</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Ceiling / soffit framing — каркас (RCP)</text>
  <text class="s" x="32" y="62">Dropped soffit: 2x frame по периметру короба. Источник — RCP, не structural план.</text>
  <!-- structure above -->
  <rect x="100" y="90" width="440" height="16" fill="#7c8a96"/>
  <text class="s" x="100" y="84">структура выше</text>
  <!-- dropped soffit box -->
  <rect x="180" y="140" width="200" height="70" fill="none" stroke="#6c4b2a" stroke-width="3"/>
  <!-- 2x frame members -->
  <g fill="url(#w)" stroke="#3a3a3a" stroke-width="1.2">
    <rect x="180" y="140" width="200" height="14"/><rect x="180" y="196" width="200" height="14"/>
    <rect x="180" y="140" width="14" height="70"/><rect x="366" y="140" width="14" height="70"/>
  </g>
  <!-- hangers to structure -->
  <line x1="230" y1="106" x2="230" y2="140" stroke="#3a3a3a" stroke-width="2"/><line x1="330" y1="106" x2="330" y2="140" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="280" y1="175" x2="560" y2="160" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="163">Dropped soffit frame (2x4)</text>
  <line x1="330" y1="120" x2="560" y2="120" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="123">Подвес к структуре выше</text>
</svg>
