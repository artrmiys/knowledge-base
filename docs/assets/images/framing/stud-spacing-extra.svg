<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="t d">
  <title id="t">Stud spacing, extra studs and double studs</title>
  <desc id="d">Wall elevation: field studs at 16 inch on center, extra studs at corner and around an opening (king, jack, cripple), and double studs at bearing or demising.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#2f7fd6"/></marker>
    <pattern id="w" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="9" height="9" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="9" stroke="#c89b5a" stroke-width="0.9"/></pattern>
    <style>
      .ttl{font:700 21px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.sub{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
      .lab{font:600 13px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#566}
      .grn{font:700 12px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}
      .dim{stroke:#2f7fd6;stroke-width:1;fill:none}
      .st{fill:url(#w);stroke:#3a3a3a;stroke-width:1.2}
    </style>
  </defs>
  <rect width="760" height="360" fill="#fff"/>
  <text class="ttl" x="32" y="40">Studs: field spacing · extra · double</text>
  <text class="sub" x="32" y="62">Field — 16" o.c.; extra — corners/openings (king/jack/cripple); dbl — bearing/demising.</text>

  <!-- plates -->
  <rect x="60" y="110" width="640" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"/>
  <rect x="60" y="300" width="640" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"/>

  <!-- corner cluster (3 studs) -->
  <rect class="st" x="60" y="126" width="14" height="174"/>
  <rect class="st" x="76" y="126" width="14" height="174"/>
  <rect class="st" x="60" y="126" width="30" height="14"/>

  <!-- field studs -->
  <rect class="st" x="150" y="126" width="12" height="174"/>
  <rect class="st" x="210" y="126" width="12" height="174"/>

  <!-- opening with king/jack/cripple -->
  <rect class="st" x="290" y="126" width="14" height="174"/> <!-- king L -->
  <rect class="st" x="304" y="170" width="11" height="130"/> <!-- jack L -->
  <rect class="st" x="470" y="126" width="14" height="174"/> <!-- king R -->
  <rect class="st" x="459" y="170" width="11" height="130"/> <!-- jack R -->
  <rect x="304" y="156" width="166" height="14" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.4"/> <!-- header -->
  <rect class="st" x="350" y="126" width="10" height="30"/> <!-- cripple -->
  <rect class="st" x="410" y="126" width="10" height="30"/> <!-- cripple -->
  <rect x="315" y="170" width="144" height="130" fill="#f4f7fa" stroke="#9bb0c2" stroke-width="1" stroke-dasharray="5 4"/>
  <text class="note" x="360" y="245">opening</text>

  <!-- field studs after opening -->
  <rect class="st" x="540" y="126" width="12" height="174"/>

  <!-- double studs (dbl) -->
  <rect class="st" x="610" y="126" width="13" height="174"/>
  <rect class="st" x="623" y="126" width="13" height="174"/>

  <!-- 16 o.c. dimension -->
  <line class="dim" x1="156" y1="335" x2="216" y2="335"/>
  <line class="dim" x1="156" y1="330" x2="156" y2="340"/><line class="dim" x1="216" y1="330" x2="216" y2="340"/>
  <text class="grn" x="162" y="352">16" o.c.</text>

  <!-- callouts -->
  <line class="dim" x1="75" y1="100" x2="75" y2="80" marker-end="url(#arrow)"/><text class="grn" x="40" y="76">Corner (extra)</text>
  <line class="dim" x1="385" y1="150" x2="385" y2="86" marker-end="url(#arrow)"/><text class="grn" x="330" y="82">King · Jack · Cripple (extra)</text>
  <line class="dim" x1="623" y1="100" x2="623" y2="80" marker-end="url(#arrow)"/><text class="grn" x="560" y="76">Dbl studs (bearing/demising)</text>
</svg>
