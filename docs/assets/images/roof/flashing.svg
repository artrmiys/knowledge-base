<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Roof to wall step and kick-out flashing</title>
  <defs>
    <pattern id="o" width="9" height="9" patternUnits="userSpaceOnUse"><rect width="9" height="9" fill="#eef2f6"/><circle cx="2" cy="2" r="1" fill="#9bb0c2"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Flashing — roof-to-wall, step и kick-out</text>
  <text class="s" x="32" y="62">Отдельно от window flashing. Kick-out у низа примыкания часто забывают.</text>
  <!-- wall -->
  <rect x="120" y="80" width="60" height="200" fill="url(#o)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- sloped roof meeting wall -->
  <polygon points="180,180 520,260 520,290 180,210" fill="#dfe7ee" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- step flashing (zigzag at junction) -->
  <polyline points="180,200 196,196 196,182 212,178 212,164 228,160" fill="none" stroke="#c0392b" stroke-width="3"/>
  <!-- kick-out at bottom -->
  <path d="M180,205 q-18,6 -26,22" fill="none" stroke="#c0392b" stroke-width="4"/>
  <line x1="205" y1="185" x2="560" y2="150" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="153">Step flashing</text>
  <line x1="160" y1="222" x2="560" y2="220" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="223">Kick-out flashing</text>
  <text class="l" x="120" y="300" fill="#5a6a5a"></text>
</svg>
