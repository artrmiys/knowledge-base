<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Cantilevered floor section</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Cantilever — вынос за опору без нижней поддержки</text>
  <text class="s" x="32" y="62">Меняет rim/edge material, blocking и нередко holdowns.</text>
  <!-- support wall -->
  <rect x="300" y="200" width="40" height="70" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.4"/>
  <!-- joists cantilevering right -->
  <rect x="150" y="170" width="430" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.4"/>
  <rect x="150" y="190" width="200" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.2"/>
  <!-- rim at cantilever edge -->
  <rect x="566" y="160" width="14" height="40" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <!-- support line -->
  <line x1="320" y1="186" x2="320" y2="200" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4 3"/>
  <text class="s" x="350" y="225">support</text>
  <text class="s" x="470" y="150">cantilever →</text>
  <line x1="573" y1="180" x2="600" y2="170" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="608" y="173">Rim / edge при выносе</text>
  <line x1="250" y1="178" x2="600" y2="210" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="608" y="213">Joists через опору</text>
</svg>
