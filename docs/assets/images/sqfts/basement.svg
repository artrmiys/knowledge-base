<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Basement wall on concrete slab</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <pattern id="c" width="9" height="9" patternUnits="userSpaceOnUse"><rect width="9" height="9" fill="#e7e9ec"/><circle cx="2" cy="2" r="0.9" fill="#9aa0a8"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Basement — стена на бетоне</text>
  <text class="s" x="32" y="62">Btm plate всегда P.T. (контакт с бетоном). Box sheathing + vapor barrier.</text>
  <!-- concrete wall -->
  <rect x="150" y="120" width="44" height="150" fill="url(#c)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- studs -->
  <g fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"><rect x="210" y="120" width="16" height="130"/><rect x="270" y="120" width="16" height="130"/><rect x="330" y="120" width="16" height="130"/></g>
  <!-- PT bottom plate -->
  <rect x="200" y="250" width="160" height="18" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <!-- slab -->
  <rect x="150" y="268" width="260" height="20" fill="url(#c)" stroke="#3a3a3a" stroke-width="1.4"/>
  <line x1="280" y1="255" x2="540" y2="245" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="548" y="248">Btm plate — всегда P.T.</text>
  <line x1="278" y1="150" x2="540" y2="140" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="548" y="143">Studs (по высоте)</text>
  <line x1="172" y1="180" x2="540" y2="195" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="548" y="198">Concrete / foundation</text>
</svg>
