<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="t d">
  <title id="t">CMU wall — continuous insulation layer stack</title>
  <desc id="d">Section of a CMU wall: masonry veneer, continuous insulation, Z metal furring, air barrier, concrete masonry units. Frame may be by others but insulation, furring and flashing are counted.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/>
    </marker>
    <pattern id="stone" width="22" height="18" patternUnits="userSpaceOnUse">
      <rect width="22" height="18" fill="#d9c7b0"/>
      <line x1="0" y1="9" x2="22" y2="9" stroke="#9c8a6c" stroke-width="1.3"/>
      <line x1="11" y1="0" x2="11" y2="9" stroke="#9c8a6c" stroke-width="1.3"/>
      <line x1="0" y1="9" x2="0" y2="18" stroke="#9c8a6c" stroke-width="1.3"/>
    </pattern>
    <pattern id="rigid" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#d8ecff"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#2c7fb8" stroke-width="1.1"/>
    </pattern>
    <pattern id="cmu" width="60" height="40" patternUnits="userSpaceOnUse">
      <rect width="60" height="40" fill="#e9eef2"/>
      <rect x="2" y="2" width="56" height="36" fill="none" stroke="#7d8e9b" stroke-width="1.4"/>
      <line x1="30" y1="2" x2="30" y2="38" stroke="#7d8e9b" stroke-width="1.1"/>
    </pattern>
    <style>
      .ttl{font:700 21px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
      .sub{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
      .lab{font:600 15px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
      .note{font:400 13px "Segoe UI",Arial,sans-serif;fill:#566}
      .side{font:700 13px "Segoe UI",Arial,sans-serif;fill:#8a98a5;letter-spacing:1px}
      .lead{stroke:#2e7d32;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="920" height="520" fill="#ffffff"/>
  <text class="ttl" x="40" y="56">CMU стена — каркас чужой, оболочка наша</text>
  <text class="sub" x="40" y="80">Insulation at CMU, Z-furring и flashing считаем, даже если CMU by others.</text>

  <g>
    <rect x="120" y="120" width="34" height="300" fill="url(#stone)" stroke="#3a3a3a" stroke-width="1.4"/>
    <rect x="154" y="120" width="34" height="300" fill="url(#rigid)" stroke="#2c7fb8" stroke-width="1.4"/>
    <path d="M188,150 h10 v6 h-8 M188,250 h10 v6 h-8 M188,350 h10 v6 h-8" fill="none" stroke="#8a5a2a" stroke-width="2.2"/>
    <rect x="198" y="120" width="8" height="300" fill="#d9f2d8" stroke="#2e7d32" stroke-width="1.2"/>
    <rect x="206" y="120" width="150" height="300" fill="url(#cmu)" stroke="#3a3a3a" stroke-width="1.6"/>
  </g>

  <text class="side" x="120" y="440">EXTERIOR</text>
  <text class="side" x="250" y="440">INTERIOR (CMU)</text>

  <line class="lead" x1="137" y1="150" x2="560" y2="142"/>
  <text class="lab" x="572" y="139">Masonry / stone veneer</text>
  <text class="note" x="572" y="158">обычно by others — verify</text>

  <line class="lead" x1="171" y1="205" x2="560" y2="206"/>
  <text class="lab" x="572" y="203">Continuous insulation</text>
  <text class="note" x="572" y="222">= «Insulation at CMU», SQ FT — наша строка</text>

  <line class="lead" x1="193" y1="258" x2="560" y2="272"/>
  <text class="lab" x="572" y="269">Z metal furring</text>
  <text class="note" x="572" y="288">держит rigid на блоке; client против metal — verify</text>

  <line class="lead" x1="200" y1="320" x2="560" y2="338"/>
  <text class="lab" x="572" y="335">Air barrier</text>
  <text class="note" x="572" y="354">self-adhered; отдельная позиция</text>

  <line class="lead" x1="280" y1="380" x2="560" y2="404"/>
  <text class="lab" x="572" y="401">Concrete masonry units</text>
  <text class="note" x="572" y="420">каркас by others; обшивку/flashing считаем</text>
</svg>
