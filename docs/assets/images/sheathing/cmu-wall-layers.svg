<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="t d">
  <title id="t">CMU exterior wall — layer stack</title>
  <desc id="d">Cast stone masonry veneer, masonry ties, continuous insulation, Z metal furring, self-adhered air barrier, CMU block — with takeoff notes.</desc>
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2c7fb8"/>
    </marker>
    <style>
      .bg{fill:#f8faf8}.panel{fill:#fff;stroke:#d7e5d4;stroke-width:2}
      .veneer{fill:#e3a07a;stroke:#a85b32;stroke-width:2}.air{fill:#eef3f7;stroke:#8aa0b0;stroke-width:2}
      .insul{fill:#fff3c4;stroke:#c78b00;stroke-width:2}.zfur{fill:#b9c0c7;stroke:#5b636b;stroke-width:2}
      .barrier{fill:#d9f2d8;stroke:#2e7d32;stroke-width:2}.cmu{fill:#cfd4d8;stroke:#6b7378;stroke-width:2}
      .label{font:600 19px Arial,sans-serif;fill:#1f2a1f}.small{font:14px Arial,sans-serif;fill:#374237}
      .rule{font:600 15px Arial,sans-serif;fill:#2c7fb8}.line{stroke:#2c7fb8;stroke-width:2;marker-end:url(#ar2)}
      .side{font:600 14px Arial,sans-serif;fill:#5a6a5a}.mort{stroke:#6b7378;stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="920" height="520" rx="16"/>
  <rect class="panel" x="36" y="34" width="848" height="452" rx="14"/>
  <text class="label" x="64" y="76">CMU (CI) wall — Insulation at CMU + Z furring отдельно</text>
  <text class="small" x="64" y="100">Каркас (CMU) by others, но insulation / Z furring / flashing — наши.</text>

  <rect class="veneer" x="120" y="130" width="40" height="270"/>
  <rect class="air"    x="160" y="130" width="16" height="270"/>
  <rect class="insul"  x="176" y="130" width="34" height="270"/>
  <rect class="zfur"   x="210" y="130" width="12" height="270"/>
  <rect class="barrier" x="222" y="130" width="12" height="270"/>
  <rect class="cmu"    x="234" y="130" width="150" height="270"/>
  <line class="mort" x1="234" y1="175" x2="384" y2="175"/>
  <line class="mort" x1="234" y1="220" x2="384" y2="220"/>
  <line class="mort" x1="234" y1="265" x2="384" y2="265"/>
  <line class="mort" x1="234" y1="310" x2="384" y2="310"/>
  <line class="mort" x1="234" y1="355" x2="384" y2="355"/>
  <line class="mort" x1="309" y1="130" x2="309" y2="400"/>

  <text class="side" x="118" y="420">Exterior</text>
  <text class="side" x="320" y="420">Interior</text>

  <line class="line" x1="470" y1="160" x2="138" y2="160"/>
  <text class="rule" x="486" y="160">Cast stone / masonry veneer</text>
  <text class="small" x="486" y="180">+ masonry ties — обычно by others.</text>

  <line class="line" x1="470" y1="225" x2="192" y2="220"/>
  <text class="rule" x="486" y="225">Continuous insulation</text>
  <text class="small" x="486" y="245">= строка Insulation at CMU, SQ FT.</text>

  <line class="line" x1="470" y1="290" x2="216" y2="265"/>
  <text class="rule" x="486" y="290">Z metal furring</text>
  <text class="small" x="486" y="310">Держит insulation на блоке.</text>

  <line class="line" x1="470" y1="350" x2="228" y2="320"/>
  <text class="rule" x="486" y="350">Self-adhered air barrier</text>
  <text class="small" x="486" y="370">Отдельная строка, если in scope.</text>

  <line class="line" x1="470" y1="405" x2="300" y2="380"/>
  <text class="rule" x="486" y="405">CMU block</text>
  <text class="small" x="486" y="425">By others — но flashing наш.</text>
</svg>
