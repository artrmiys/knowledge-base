<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Eave framing section takeoff diagram</title>
  <desc id="desc">Technical eave section showing roof deck, rafter tail, double top plate, subfascia, fascia, soffit, ledger nailer, and takeoff units.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.4" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#1f2933"/>
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#1f2933"/>
    </marker>
    <pattern id="wood" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(24)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#d0a869" stroke-width="2"/>
    </pattern>
    <pattern id="sheath" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#a7b5bf" stroke-width="1.4"/>
    </pattern>
    <style>
      .sheet { fill: #fff; }
      .frame { fill: #fff; stroke: #111827; stroke-width: 3.2; stroke-linejoin: round; }
      .wood { fill: url(#wood); stroke: #111827; stroke-width: 3.2; stroke-linejoin: round; }
      .ply { fill: url(#sheath); stroke: #111827; stroke-width: 3; stroke-linejoin: round; }
      .finish { fill: #eef4f7; stroke: #111827; stroke-width: 3; stroke-linejoin: round; }
      .hidden { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 9 7; fill: none; }
      .dim { stroke: #1f2933; stroke-width: 2.4; marker-start: url(#arrow); marker-end: url(#arrow); fill: none; }
      .ext { stroke: #1f2933; stroke-width: 2; fill: none; }
      .lead { stroke: #1f2933; stroke-width: 2.3; marker-end: url(#dot); fill: none; }
      .hatch { stroke: #c7d2da; stroke-width: 1.2; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .note { font: 16px Arial, Helvetica, sans-serif; fill: #374151; }
      .tiny { font: 14px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .badge { fill: #f7faf7; stroke: #9bb89d; stroke-width: 2; }
      .green { fill: #1b5e20; }
    </style>
  </defs>

  <rect class="sheet" x="0" y="0" width="1280" height="760"/>
  <rect x="34" y="34" width="1212" height="692" rx="8" fill="#fff" stroke="#cfd8dc" stroke-width="2"/>
  <text class="title" x="72" y="82">Eave / soffit framing section - what to count</text>
  <text class="note" x="72" y="112">Use this as a takeoff map, not as a project-specific construction detail. Follow the actual drawings first.</text>

  <!-- exterior wall studs -->
  <rect class="frame" x="655" y="350" width="154" height="282"/>
  <rect class="wood" x="672" y="368" width="24" height="246"/>
  <rect class="wood" x="725" y="368" width="24" height="246"/>
  <rect class="wood" x="778" y="368" width="24" height="246"/>
  <rect class="wood" x="642" y="320" width="178" height="28"/>
  <rect class="wood" x="642" y="292" width="178" height="28"/>
  <text class="label" x="845" y="472">Exterior wall</text>
  <text class="tiny" x="845" y="497">wall framing usually separate</text>
  <path class="lead" d="M835 465 L806 405"/>

  <!-- rafter with birdsmouth -->
  <polygon class="wood" points="212,314 786,171 806,226 650,266 632,318 228,418"/>
  <polyline points="632,318 666,309 650,266" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text class="label" x="170" y="452">Rafter / truss tail</text>
  <text class="tiny" x="170" y="477">count only if eave framing is in scope</text>
  <path class="lead" d="M356 436 L424 361"/>

  <!-- roof deck -->
  <polygon class="ply" points="172,244 797,88 812,134 185,290"/>
  <text class="label" x="148" y="204">Roof deck / sheathing</text>
  <text class="tiny" x="148" y="229">roof SQFT, not soffit SQFT</text>
  <path class="lead" d="M358 212 L450 176"/>

  <!-- roofing layer -->
  <polygon points="154,218 793,58 801,82 162,242" fill="#111827"/>
  <text class="tiny" x="604" y="58">roofing line shown for orientation</text>

  <!-- subfascia and fascia -->
  <polygon class="wood" points="174,273 222,262 250,407 202,419"/>
  <polygon class="finish" points="127,271 173,260 207,433 160,444"/>
  <text class="label" x="72" y="506">Fascia / subfascia</text>
  <text class="tiny" x="72" y="531">usually LFT along eave edge</text>
  <path class="lead" d="M230 496 L177 360"/>

  <!-- soffit board and ledger -->
  <polygon class="finish" points="166,424 659,424 659,454 159,454"/>
  <rect class="wood" x="621" y="396" width="56" height="28"/>
  <text class="label" x="316" y="512">Soffit material</text>
  <text class="tiny" x="316" y="537">vinyl / beadboard / plywood / gypsum = SQFT</text>
  <path class="lead" d="M500 500 L444 438"/>
  <text class="label" x="698" y="394">Soffit ledger / nailer</text>
  <text class="tiny" x="698" y="419">count if detail calls it out</text>
  <path class="lead" d="M692 391 L649 411"/>

  <!-- frieze / trim board -->
  <rect class="finish" x="808" y="346" width="36" height="140"/>
  <text class="label" x="866" y="354">Frieze / trim</text>
  <text class="tiny" x="866" y="379">separate if finish schedule prices it</text>
  <path class="lead" d="M858 352 L828 392"/>

  <!-- soffit vent -->
  <rect x="360" y="429" width="146" height="18" fill="#fff" stroke="#111827" stroke-width="2"/>
  <g stroke="#111827" stroke-width="2">
    <line x1="376" y1="433" x2="376" y2="443"/>
    <line x1="394" y1="433" x2="394" y2="443"/>
    <line x1="412" y1="433" x2="412" y2="443"/>
    <line x1="430" y1="433" x2="430" y2="443"/>
    <line x1="448" y1="433" x2="448" y2="443"/>
    <line x1="466" y1="433" x2="466" y2="443"/>
    <line x1="484" y1="433" x2="484" y2="443"/>
  </g>
  <text class="tiny" x="315" y="392">vent strip if shown</text>
  <path class="lead" d="M420 397 L430 429"/>

  <!-- dimensions -->
  <line class="ext" x1="159" y1="476" x2="159" y2="592"/>
  <line class="ext" x1="659" y1="476" x2="659" y2="592"/>
  <line class="dim" x1="174" y1="580" x2="644" y2="580"/>
  <text class="label green" x="304" y="617">Overhang depth</text>
  <text class="tiny" x="285" y="641">soffit SQFT = eave LFT x this depth</text>

  <line class="ext" x1="958" y1="145" x2="958" y2="245"/>
  <line class="ext" x1="1152" y1="145" x2="1152" y2="245"/>
  <line class="dim" x1="973" y1="197" x2="1137" y2="197"/>
  <text class="label green" x="955" y="129">Eave run length</text>
  <text class="tiny" x="960" y="232">measure along exterior roof edge</text>

  <!-- takeoff rule box -->
  <rect class="badge" x="914" y="438" width="280" height="184" rx="8"/>
  <text class="label" x="936" y="476">Takeoff split</text>
  <text class="note" x="936" y="510">LFT: fascia, subfascia,</text>
  <text class="note" x="936" y="535">framing, trim runs</text>
  <text class="note" x="936" y="572">SQFT: soffit material</text>
  <text class="note" x="936" y="607">Separate: truss heel</text>
</svg>
