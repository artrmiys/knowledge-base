<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Excel hotkeys keyboard map</title>
  <desc id="desc">Keyboard zones for Excel estimating work: navigation, edit, formulas, formatting, filters, and paste values.</desc>
  <defs>
    <style>
      .bg { fill: #f7faf7; }
      .panel { fill: #ffffff; stroke: #bfd4bf; stroke-width: 2; }
      .key { fill: #eef5ee; stroke: #8aae8a; stroke-width: 1.5; rx: 8; }
      .key-strong { fill: #dff3df; stroke: #498a49; stroke-width: 2; rx: 8; }
      .label { fill: #1f3321; font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #334a35; font-family: Inter, Arial, sans-serif; font-size: 15px; }
      .tiny { fill: #3f5541; font-family: Inter, Arial, sans-serif; font-size: 13px; }
      .chip { fill: #e8f7d6; stroke: #87aa54; stroke-width: 1.5; rx: 14; }
      .line { stroke: #6a936a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#6a936a"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="520"/>
  <rect class="panel" x="32" y="30" width="896" height="460" rx="18"/>

  <text class="label" x="64" y="74">Excel hotkeys map</text>
  <text class="small" x="64" y="102">Use these zones during takeoff output: move fast, keep formulas visible, paste clean values.</text>

  <g transform="translate(64 142)">
    <rect class="key-strong" x="0" y="0" width="70" height="48"/>
    <text class="small" x="22" y="30">Esc</text>
    <rect class="key-strong" x="88" y="0" width="70" height="48"/>
    <text class="small" x="113" y="30">F2</text>
    <rect class="key" x="176" y="0" width="70" height="48"/>
    <text class="small" x="200" y="30">F4</text>
    <rect class="key" x="264" y="0" width="70" height="48"/>
    <text class="small" x="288" y="30">F9</text>
    <rect class="key" x="352" y="0" width="70" height="48"/>
    <text class="small" x="374" y="30">F11</text>

    <rect class="key" x="0" y="70" width="70" height="48"/>
    <text class="small" x="24" y="100">Ctrl</text>
    <rect class="key" x="88" y="70" width="70" height="48"/>
    <text class="small" x="114" y="100">C</text>
    <rect class="key" x="176" y="70" width="70" height="48"/>
    <text class="small" x="203" y="100">V</text>
    <rect class="key" x="264" y="70" width="70" height="48"/>
    <text class="small" x="290" y="100">Z</text>
    <rect class="key" x="352" y="70" width="70" height="48"/>
    <text class="small" x="379" y="100">Y</text>

    <rect class="key" x="0" y="140" width="70" height="48"/>
    <text class="small" x="24" y="170">Alt</text>
    <rect class="key" x="88" y="140" width="70" height="48"/>
    <text class="small" x="112" y="170">H</text>
    <rect class="key" x="176" y="140" width="70" height="48"/>
    <text class="small" x="202" y="170">V</text>
    <rect class="key" x="264" y="140" width="70" height="48"/>
    <text class="small" x="290" y="170">I</text>
    <rect class="key" x="352" y="140" width="70" height="48"/>
    <text class="small" x="378" y="170">D</text>

    <rect class="key-strong" x="470" y="0" width="82" height="48"/>
    <text class="small" x="486" y="30">Home</text>
    <rect class="key-strong" x="568" y="0" width="82" height="48"/>
    <text class="small" x="594" y="30">End</text>
    <rect class="key" x="666" y="0" width="82" height="48"/>
    <text class="small" x="681" y="30">PgUp</text>
    <rect class="key" x="764" y="0" width="82" height="48"/>
    <text class="small" x="778" y="30">PgDn</text>

    <rect class="key" x="568" y="92" width="82" height="48"/>
    <text class="small" x="598" y="122">Up</text>
    <rect class="key" x="470" y="150" width="82" height="48"/>
    <text class="small" x="490" y="180">Left</text>
    <rect class="key" x="568" y="150" width="82" height="48"/>
    <text class="small" x="590" y="180">Down</text>
    <rect class="key" x="666" y="150" width="82" height="48"/>
    <text class="small" x="686" y="180">Right</text>
  </g>

  <g transform="translate(72 380)">
    <rect class="chip" x="0" y="0" width="155" height="34"/>
    <text class="tiny" x="18" y="22">F2: edit cell</text>
    <rect class="chip" x="170" y="0" width="168" height="34"/>
    <text class="tiny" x="188" y="22">Ctrl+Arrow: jump</text>
    <rect class="chip" x="356" y="0" width="170" height="34"/>
    <text class="tiny" x="374" y="22">Ctrl+Shift+L: filter</text>
    <rect class="chip" x="544" y="0" width="152" height="34"/>
    <text class="tiny" x="562" y="22">Ctrl+1: format</text>
    <rect class="chip" x="712" y="0" width="122" height="34"/>
    <text class="tiny" x="730" y="22">Alt+=: sum</text>
  </g>

  <path class="line" d="M160 332 C150 304, 150 260, 150 210"/>
  <path class="line" d="M342 332 C340 294, 340 250, 340 210"/>
  <path class="line" d="M624 332 C640 290, 672 254, 710 230"/>

  <text class="tiny" x="72" y="456">Tip: keep the mouse for checking drawings, but use keyboard for Excel entry and cleanup.</text>
</svg>
