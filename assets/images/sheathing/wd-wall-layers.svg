<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="t d">
  <title id="t">WD stud exterior wall — layer stack</title>
  <desc id="d">Brick veneer, WRB, Type X gypsum sheathing, FRT structural sheathing, batt insulation in studs, interior gypsum — with takeoff notes.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <style>
      .bg{fill:#f8faf8}.panel{fill:#fff;stroke:#d7e5d4;stroke-width:2}
      .veneer{fill:#e3a07a;stroke:#a85b32;stroke-width:2}.wrb{fill:#d9f2d8;stroke:#2e7d32;stroke-width:2}
      .gyp{fill:#eef3f7;stroke:#8aa0b0;stroke-width:2}.sheath{fill:#d8ecff;stroke:#2c7fb8;stroke-width:2}
      .frame{fill:#f1c27d;stroke:#9a6b32;stroke-width:2}.insul{fill:#fff3c4;stroke:#c78b00;stroke-width:2}
      .pt{fill:#c7a27b;stroke:#6c4b2a;stroke-width:2}
      .label{font:600 19px Arial,sans-serif;fill:#1f2a1f}.small{font:14px Arial,sans-serif;fill:#374237}
      .rule{font:600 15px Arial,sans-serif;fill:#2e7d32}.line{stroke:#2e7d32;stroke-width:2;marker-end:url(#ar)}
      .side{font:600 14px Arial,sans-serif;fill:#5a6a5a}
    </style>
  </defs>
  <rect class="bg" width="920" height="520" rx="16"/>
  <rect class="panel" x="36" y="34" width="848" height="452" rx="14"/>
  <text class="label" x="64" y="76">WD stud wall — считай каждый слой отдельной строкой</text>
  <text class="small" x="64" y="100">Пример: brick veneer / Type X gypsum / FRT ply / batt — wall type schedule + section.</text>

  <rect class="veneer" x="120" y="130" width="36" height="270"/>
  <rect class="wrb"    x="156" y="130" width="14" height="270"/>
  <rect class="gyp"    x="170" y="130" width="24" height="270"/>
  <rect class="sheath" x="194" y="130" width="22" height="270"/>
  <rect class="insul"  x="216" y="130" width="150" height="270"/>
  <rect class="frame"  x="216" y="130" width="16" height="270"/>
  <rect class="frame"  x="283" y="130" width="16" height="270"/>
  <rect class="frame"  x="350" y="130" width="16" height="270"/>
  <rect class="frame"  x="216" y="130" width="150" height="16"/>
  <rect class="pt"     x="216" y="384" width="150" height="16"/>
  <rect class="gyp"    x="366" y="130" width="20" height="270"/>

  <text class="side" x="118" y="420">Exterior</text>
  <text class="side" x="332" y="420">Interior</text>

  <line class="line" x1="470" y1="150" x2="138" y2="150"/>
  <text class="rule" x="486" y="150">Masonry veneer</text>
  <text class="small" x="486" y="170">Часто by others — verify scope.</text>

  <line class="line" x1="470" y1="200" x2="172" y2="180"/>
  <text class="rule" x="486" y="200">WRB / air barrier</text>
  <text class="small" x="486" y="220">Отдельная строка, SQ FT.</text>

  <line class="line" x1="470" y1="250" x2="182" y2="225"/>
  <text class="rule" x="486" y="250">Type X gypsum sheathing</text>
  <text class="small" x="486" y="270">5/8&quot;; бывает (2) layers + over FRT.</text>

  <line class="line" x1="470" y1="300" x2="205" y2="270"/>
  <text class="rule" x="486" y="300">FRT structural sheathing</text>
  <text class="small" x="486" y="320">1/2&quot; Ply FRT — своя строка (4x8).</text>

  <line class="line" x1="470" y1="350" x2="300" y2="300"/>
  <text class="rule" x="486" y="350">Batt insulation + studs</text>
  <text class="small" x="486" y="370">Insulation отдельно от gypsum.</text>

  <line class="line" x1="470" y1="400" x2="282" y2="392"/>
  <text class="rule" x="486" y="400">P.T. bottom plate</text>
  <text class="small" x="486" y="420">Если low plate = P.T. — своя строка.</text>
</svg>
