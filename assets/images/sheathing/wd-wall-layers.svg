<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="t d">
  <title id="t">WD stud brick wall — layer stack</title>
  <desc id="d">Section of a wood stud brick-veneer wall: brick veneer, WRB, Type X gypsum sheathing, FRT structural sheathing, batt insulation in studs, interior gypsum — each a separate takeoff line.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/>
    </marker>
    <pattern id="brick" width="18" height="22" patternUnits="userSpaceOnUse">
      <rect width="18" height="22" fill="#e0a079"/>
      <line x1="0" y1="11" x2="18" y2="11" stroke="#a85b32" stroke-width="1.4"/>
      <line x1="9" y1="0" x2="9" y2="11" stroke="#a85b32" stroke-width="1.4"/>
      <line x1="0" y1="11" x2="0" y2="22" stroke="#a85b32" stroke-width="1.4"/>
    </pattern>
    <pattern id="batt2" width="20" height="16" patternUnits="userSpaceOnUse">
      <rect width="20" height="16" fill="#fdf6e3"/>
      <path d="M0,8 Q5,0 10,8 T20,8" fill="none" stroke="#caa64a" stroke-width="1.2"/>
    </pattern>
    <pattern id="osb2" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#eef2f6"/>
      <circle cx="1.5" cy="1.5" r="0.7" fill="#9bb0c2"/>
      <circle cx="4.5" cy="4" r="0.7" fill="#9bb0c2"/>
    </pattern>
    <pattern id="wood2" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#f2d6a8"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/>
    </pattern>
    <pattern id="gyphatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#eef3f7"/>
      <circle cx="4" cy="4" r="0.8" fill="#9aa9b6"/>
    </pattern>
    <style>
      .ttl{font:700 21px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
      .sub{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
      .lab{font:600 15px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
      .note{font:400 13px "Segoe UI",Arial,sans-serif;fill:#566}
      .side{font:700 13px "Segoe UI",Arial,sans-serif;fill:#8a98a5;letter-spacing:1px}
      .lead{stroke:#2e7d32;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="920" height="520" fill="#ffffff"/>
  <text class="ttl" x="40" y="56">WD stud / brick — каждый слой отдельной строкой</text>
  <text class="sub" x="40" y="80">Wall type schedule + section. Type X gypsum, FRT ply и veneer — это разные lines.</text>

  <g>
    <rect x="120" y="120" width="34" height="300" fill="url(#brick)" stroke="#3a3a3a" stroke-width="1.4"/>
    <rect x="154" y="120" width="10" height="300" fill="#d9f2d8" stroke="#2e7d32" stroke-width="1.3"/>
    <rect x="164" y="120" width="20" height="300" fill="url(#gyphatch)" stroke="#8aa0b0" stroke-width="1.4"/>
    <rect x="184" y="120" width="22" height="300" fill="url(#osb2)" stroke="#3a3a3a" stroke-width="1.4"/>
    <rect x="206" y="120" width="150" height="300" fill="url(#batt2)" stroke="#3a3a3a" stroke-width="1.4"/>
    <rect x="206" y="120" width="16" height="300" fill="url(#wood2)" stroke="#3a3a3a" stroke-width="1.2"/>
    <rect x="340" y="120" width="16" height="300" fill="url(#wood2)" stroke="#3a3a3a" stroke-width="1.2"/>
    <rect x="206" y="120" width="150" height="13" fill="url(#wood2)" stroke="#3a3a3a" stroke-width="1.2"/>
    <rect x="206" y="407" width="150" height="13" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.4"/>
    <rect x="356" y="120" width="16" height="300" fill="url(#gyphatch)" stroke="#8aa0b0" stroke-width="1.4"/>
  </g>

  <text class="side" x="120" y="440">EXTERIOR</text>
  <text class="side" x="318" y="440">INTERIOR</text>

  <line class="lead" x1="137" y1="150" x2="560" y2="140"/>
  <text class="lab" x="572" y="137">Brick / masonry veneer</text>
  <text class="note" x="572" y="156">часто by others — verify scope</text>

  <line class="lead" x1="174" y1="195" x2="560" y2="200"/>
  <text class="lab" x="572" y="197">Type X gypsum sheathing</text>
  <text class="note" x="572" y="216">5/8&quot;; бывает (2) layers + over FRT</text>

  <line class="lead" x1="195" y1="250" x2="560" y2="262"/>
  <text class="lab" x="572" y="259">FRT structural sheathing</text>
  <text class="note" x="572" y="278">1/2&quot; Ply FRT — своя строка (4x8)</text>

  <line class="lead" x1="290" y1="300" x2="560" y2="324"/>
  <text class="lab" x="572" y="321">Batt insulation + studs</text>
  <text class="note" x="572" y="340">insulation отдельно от gypsum</text>

  <line class="lead" x1="280" y1="413" x2="560" y2="386"/>
  <text class="lab" x="572" y="383">P.T. bottom plate</text>
  <text class="note" x="572" y="402">если low plate = P.T. — своя строка</text>
</svg>
