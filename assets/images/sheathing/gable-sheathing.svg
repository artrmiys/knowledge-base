<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Gable triangle sheathing</title>
  <defs>
    <pattern id="o" width="9" height="9" patternUnits="userSpaceOnUse"><rect width="9" height="9" fill="#eef2f6"/><circle cx="2" cy="2" r="1" fill="#9bb0c2"/><circle cx="6.5" cy="6" r="1" fill="#9bb0c2"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Gable sheathing — обшивка треугольника фронтона</text>
  <text class="s" x="32" y="62">SQFT треугольника от верха верхней доски стены. Не путать с truss heel / box.</text>
  <!-- gable triangle -->
  <polygon points="120,250 360,110 600,250" fill="url(#o)" stroke="#3a3a3a" stroke-width="1.8"/>
  <!-- wall top line -->
  <line x1="120" y1="250" x2="600" y2="250" stroke="#6c4b2a" stroke-width="4"/>
  <!-- studs hint in gable -->
  <g stroke="#c89b5a" stroke-width="2" opacity="0.7">
    <line x1="240" y1="250" x2="240" y2="180"/><line x1="300" y1="250" x2="300" y2="145"/>
    <line x1="360" y1="250" x2="360" y2="110"/><line x1="420" y1="250" x2="420" y2="145"/><line x1="480" y1="250" x2="480" y2="180"/>
  </g>
  <line x1="360" y1="180" x2="600" y2="148" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="606" y="151">Gable sheathing (SQFT)</text>
  <line x1="300" y1="250" x2="630" y2="245" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="638" y="248">Верх стены (BTM)</text>
</svg>
