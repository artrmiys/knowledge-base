<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Balcony build-up layers</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Balcony — buildup (sleepers / membrane / decking)</text>
  <text class="s" x="32" y="62">Trims отдельно от general exterior. Composition (pavers/membrane) часто by others.</text>
  <!-- structure -->
  <rect x="150" y="210" width="320" height="20" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- membrane (EPDM) -->
  <rect x="150" y="196" width="320" height="14" fill="#3a3a3a"/>
  <!-- sleepers -->
  <g fill="url(#w)" stroke="#6c4b2a" stroke-width="1.3"><rect x="170" y="176" width="20" height="20"/><rect x="300" y="176" width="20" height="20"/><rect x="430" y="176" width="20" height="20"/></g>
  <!-- decking / pavers -->
  <rect x="150" y="160" width="320" height="16" fill="#ccd6c9" stroke="#3a3a3a" stroke-width="1.4"/>
  <line x1="350" y1="168" x2="560" y2="150" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="568" y="153">Decking / pavers</text>
  <line x1="320" y1="186" x2="560" y2="180" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="568" y="183">Sleepers</text>
  <line x1="300" y1="203" x2="560" y2="210" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="568" y="213">Membrane (EPDM)</text>
  <line x1="250" y1="220" x2="560" y2="240" stroke="#2e7d32" stroke-width="1.4"/><text class="l" x="568" y="243">Framing / structure</text>
</svg>
