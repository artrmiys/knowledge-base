<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Room finish schedule columns</title>
  <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.h{font:700 13px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.c{font:400 13px "Segoe UI",Arial,sans-serif;fill:#374237}.ok{fill:#2f7fd6}.no{fill:#c0392b}</style>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Room schedule — что считать в trim</text>
  <text class="s" x="32" y="62">Wood base только при `Wd`; tile base исключай. Common areas — отдельно.</text>
  <!-- table -->
  <g stroke="#9bb0c2" stroke-width="1.2">
    <rect x="60" y="90" width="640" height="36" fill="#eef3f7"/>
    <rect x="60" y="126" width="640" height="34" fill="#fff"/>
    <rect x="60" y="160" width="640" height="34" fill="#fafbfc"/>
    <rect x="60" y="194" width="640" height="34" fill="#fff"/>
    <line x1="240" y1="90" x2="240" y2="228"/><line x1="400" y1="90" x2="400" y2="228"/><line x1="540" y1="90" x2="540" y2="228"/>
  </g>
  <text class="h" x="76" y="113">Room</text><text class="h" x="256" y="113">Base</text><text class="h" x="416" y="113">Crown</text><text class="h" x="556" y="113">Считать?</text>
  <text class="c" x="76" y="148">Living</text><text class="c" x="256" y="148">Wd</text><text class="c" x="416" y="148">yes</text><text class="c ok" x="556" y="148">✓ wood base</text>
  <text class="c" x="76" y="182">Bath</text><text class="c" x="256" y="182">Tile</text><text class="c" x="416" y="182">—</text><text class="c no" x="556" y="182">✗ tile исключить</text>
  <text class="c" x="76" y="216">Garage</text><text class="c" x="256" y="216">—</text><text class="c" x="416" y="216">no</text><text class="c no" x="556" y="216">✗ нет base/crown</text>
</svg>
