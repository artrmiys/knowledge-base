<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Finish schedule trim check</title>
  <desc id="desc">Diagram showing how base and crown takeoff should be checked against finish schedule columns.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <style>
      .bg{fill:#fff;stroke:#cfd8d3;stroke-width:2;rx:8}
      .panel{fill:#f8fbf8;stroke:#7cb342;stroke-width:2;rx:8}
      .warn{fill:#fffdf7;stroke:#f9a825;stroke-width:2;rx:6}
      .line{stroke:#2e7d32;stroke-width:3;marker-end:url(#arrow)}
      .grid{stroke:#9aa89f;stroke-width:1}
      .text{font-family:Inter,Arial,sans-serif;font-size:18px;fill:#1b1f1d}
      .small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#34423a}
      .mono{font-family:"JetBrains Mono",Consolas,monospace;font-size:14px;fill:#1b1f1d}
      .count{fill:none;stroke:#ef6c00;stroke-width:7;stroke-linecap:round}
      .exclude{fill:none;stroke:#c62828;stroke-width:6;stroke-linecap:round;stroke-dasharray:12 10}
      .wall{fill:none;stroke:#1f2421;stroke-width:12;stroke-linejoin:round}
      .cab{fill:#d7ccc8;stroke:#6d4c41;stroke-width:2}
    </style>
  </defs>

  <rect x="28" y="28" width="924" height="360" class="bg"/>
  <text x="58" y="66" class="text">1. Read finish schedule first</text>
  <rect x="58" y="88" width="470" height="154" class="panel"/>
  <rect x="86" y="116" width="414" height="96" fill="#fff" stroke="#4d5a50" stroke-width="2"/>
  <path d="M86 140 H500 M86 164 H500 M86 188 H500 M150 116 V212 M236 116 V212 M314 116 V212 M392 116 V212" class="grid"/>
  <text x="96" y="134" class="mono">Room</text>
  <text x="166" y="134" class="mono">Name</text>
  <text x="250" y="134" class="mono">Base</text>
  <text x="328" y="134" class="mono">Ceiling</text>
  <text x="408" y="134" class="mono">Remark</text>
  <text x="96" y="158" class="mono">101</text>
  <text x="166" y="158" class="mono">Kitchen</text>
  <text x="250" y="158" class="mono">B-1</text>
  <text x="328" y="158" class="mono">GWB</text>
  <text x="408" y="158" class="mono">-</text>
  <text x="96" y="182" class="mono">102</text>
  <text x="166" y="182" class="mono">Closet</text>
  <text x="250" y="182" class="mono">B-1</text>
  <text x="328" y="182" class="mono">GWB</text>
  <text x="408" y="182" class="mono">no crown</text>
  <text x="96" y="206" class="mono">103</text>
  <text x="166" y="206" class="mono">Bath</text>
  <text x="250" y="206" class="mono">Tile</text>
  <text x="328" y="206" class="mono">GWB</text>
  <text x="408" y="206" class="mono">verify</text>

  <line x1="530" y1="164" x2="616" y2="164" class="line"/>
  <text x="58" y="272" class="text">2. Measure LF, then apply E-Wood exceptions</text>
  <path d="M110 315 H390 V376 H110 Z" class="wall"/>
  <path d="M112 317 H388 M112 374 H388 M112 317 V374" class="count"/>
  <rect x="312" y="322" width="62" height="36" class="cab"/>
  <path d="M390 320 V360" class="exclude"/>
  <text x="410" y="341" class="small">Subtract cabinet-backed run</text>

  <rect x="632" y="88" width="260" height="254" class="warn"/>
  <text x="656" y="128" class="text">Estimator check</text>
  <text x="656" y="166" class="small">Base: use Base column,</text>
  <text x="656" y="190" class="small">not only room name.</text>
  <text x="656" y="226" class="small">Crown: verify ceiling,</text>
  <text x="656" y="250" class="small">remarks, and scope.</text>
  <text x="656" y="286" class="small">Write uncertainty as</text>
  <text x="656" y="310" class="mono">TBD Base / TBD Crown</text>

  <text x="58" y="414" class="small">Internet sanity check: trim is usually measured as linear feet from room wall runs, but the project finish schedule controls material/scope.</text>
</svg>
