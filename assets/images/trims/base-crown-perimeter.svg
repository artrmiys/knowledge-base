<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Baseboard and crown perimeter rules</title>
  <desc id="desc">Diagram showing which room perimeter segments count or are excluded for baseboard and crown takeoff.</desc>
  <defs>
    <style>
      .text{font-family:Inter,Arial,sans-serif;font-size:18px;fill:#1b1f1d}
      .small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#34423a}
      .wall{fill:none;stroke:#1f2421;stroke-width:14;stroke-linejoin:round}
      .count{fill:none;stroke:#ef6c00;stroke-width:8;stroke-linecap:round}
      .exclude{fill:none;stroke:#c62828;stroke-width:6;stroke-linecap:round;stroke-dasharray:12 10}
      .note{fill:#f8fbf8;stroke:#7cb342;stroke-width:2;rx:8}
      .cabinet{fill:#d7ccc8;stroke:#6d4c41;stroke-width:2}
      .tile{fill:#e3f2fd;stroke:#1976d2;stroke-width:2}
    </style>
  </defs>
  <rect x="28" y="26" width="920" height="360" fill="#fff" stroke="#cfd8d3" stroke-width="2" rx="8"/>
  <path d="M120 90 H475 V310 H120 Z" class="wall"/>
  <path d="M122 92 H472 M122 308 H472 M122 92 V308" class="count"/>
  <path d="M475 115 V255" class="exclude"/>
  <rect x="363" y="120" width="96" height="110" class="cabinet"/>
  <text x="382" y="181" class="small">KITCHEN</text>
  <text x="360" y="247" class="small">No base behind cabinets</text>
  <rect x="160" y="190" width="70" height="76" class="tile"/>
  <text x="177" y="224" class="small">Bath</text>
  <text x="150" y="285" class="small">Check finish</text>

  <path d="M585 90 H820 V310 H585 Z" class="wall"/>
  <path d="M588 92 H817 M588 308 H817 M588 92 V308 M817 92 V308" class="count"/>
  <path d="M635 112 H760" class="exclude"/>
  <text x="636" y="133" class="small">Closet / slope / no finish</text>

  <rect x="70" y="338" width="360" height="36" class="note"/>
  <text x="90" y="362" class="small">Baseboard: measure room perimeter, then remove excluded segments.</text>
  <rect x="530" y="338" width="360" height="36" class="note"/>
  <text x="550" y="362" class="small">Crown: include only where scope and room condition allow it.</text>

  <text x="70" y="58" class="text">Baseboard</text>
  <text x="530" y="58" class="text">Crown</text>
  <text x="70" y="408" class="small">Orange = count. Red dashed = exclude / verify.</text>
</svg>
