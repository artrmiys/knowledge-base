<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Steel beam with wood nailer and hanger</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Steel beam — wood nailer / web filler</text>
  <text class="s" x="32" y="62">Top nailer → top-mount hanger; filler в стенке. Washers по детали.</text>
  <!-- steel I-beam (section) -->
  <g fill="#c2cad1" stroke="#3a3a3a" stroke-width="1.6">
    <rect x="220" y="120" width="120" height="16"/>
    <rect x="268" y="136" width="24" height="90"/>
    <rect x="220" y="226" width="120" height="16"/>
  </g>
  <!-- wood top nailer -->
  <rect x="222" y="100" width="116" height="20" fill="url(#w)" stroke="#6c4b2a" stroke-width="1.6"/>
  <!-- web filler -->
  <rect x="244" y="136" width="22" height="90" fill="url(#w)" stroke="#6c4b2a" stroke-width="1.4"/>
  <rect x="292" y="136" width="22" height="90" fill="url(#w)" stroke="#6c4b2a" stroke-width="1.4"/>
  <!-- joist on top via hanger -->
  <rect x="338" y="104" width="120" height="18" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"/>
  <line x1="280" y1="100" x2="560" y2="95" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="98">Top nailer (2x)</text>
  <line x1="255" y1="180" x2="560" y2="165" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="168">Web fillers</text>
  <line x1="280" y1="175" x2="560" y2="235" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="238">Steel beam</text>
</svg>
