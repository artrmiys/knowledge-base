<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Ribbon board let into studs</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}.st{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Ribbon board — врезана в стойки, несёт joists</text>
  <text class="s" x="32" y="62">Не путать с rim (по торцам) и blocking (между joists).</text>
  <!-- studs vertical -->
  <rect x="160" y="90" width="22" height="180" class="st"/>
  <rect x="260" y="90" width="22" height="180" class="st"/>
  <rect x="360" y="90" width="22" height="180" class="st"/>
  <rect x="460" y="90" width="22" height="180" class="st"/>
  <!-- ribbon let-in -->
  <rect x="150" y="150" width="342" height="16" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.8"/>
  <!-- joists resting on ribbon -->
  <rect x="170" y="120" width="70" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"/>
  <rect x="370" y="120" width="70" height="16" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.3"/>
  <line x1="300" y1="158" x2="560" y2="150" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="153">Ribbon (let-in)</text>
  <line x1="205" y1="128" x2="560" y2="115" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="118">Joists на ribbon</text>
  <text class="l" x="568" y="220">Studs</text>
  <line x1="271" y1="200" x2="560" y2="216" stroke="#2e7d32" stroke-width="1.4"/>
</svg>
