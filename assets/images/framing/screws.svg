<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Structural screws in a built-up member</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Screws — structural / Simpson по деталям</text>
  <text class="s" x="32" y="62">Считаем только когда явно called out. Nails — нет. Не путай с bolts.</text>
  <!-- built-up plies -->
  <rect x="150" y="110" width="360" height="44" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.5"/>
  <rect x="150" y="154" width="360" height="44" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- screws (staggered) -->
  <g stroke="#3a3a3a" stroke-width="3">
    <line x1="200" y1="120" x2="200" y2="188"/><line x1="280" y1="120" x2="280" y2="188"/>
    <line x1="360" y1="120" x2="360" y2="188"/><line x1="440" y1="120" x2="440" y2="188"/>
  </g>
  <g fill="#7c8a96"><circle cx="200" cy="120" r="5"/><circle cx="280" cy="120" r="5"/><circle cx="360" cy="120" r="5"/><circle cx="440" cy="120" r="5"/></g>
  <line x1="280" y1="120" x2="560" y2="110" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="113">Structural screws (SDS/SDW)</text>
  <line x1="330" y1="176" x2="560" y2="176" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="179">Built-up plies</text>
</svg>
