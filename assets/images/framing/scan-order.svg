<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Scan the sheet left-to-right, top-to-bottom</title>
  <style>
    .t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
    .s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
    .l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}
    .n{font:700 13px "Segoe UI",Arial,sans-serif;fill:#fff}
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="38">Сканируй лист целиком</text>
  <text class="s" x="32" y="60">Слева → направо, сверху → вниз. Не «прыгай» по чертежу — иначе пропустишь зону.</text>

  <!-- sheet -->
  <rect x="60" y="90" width="430" height="180" fill="#f4f7f4" stroke="#3a3a3a" stroke-width="1.6"/>
  <g stroke="#cdd8cd" stroke-width="1" stroke-dasharray="4 4">
    <line x1="60" y1="150" x2="490" y2="150"/>
    <line x1="60" y1="210" x2="490" y2="210"/>
    <line x1="203" y1="90" x2="203" y2="270"/>
    <line x1="346" y1="90" x2="346" y2="270"/>
  </g>

  <!-- serpentine scan path -->
  <path d="M80,120 H470 V180 H80 V240 H470"
        fill="none" stroke="#2e7d32" stroke-width="3" marker-end="url(#ah)"/>
  <!-- step badges -->
  <circle cx="80" cy="120" r="11" fill="#2e7d32"/><text class="n" x="76" y="124">1</text>
  <circle cx="470" cy="180" r="11" fill="#2e7d32"/><text class="n" x="466" y="184">2</text>
  <circle cx="80" cy="240" r="11" fill="#2e7d32"/><text class="n" x="76" y="244">3</text>

  <text class="l" x="540" y="120">1 проход = вся ширина</text>
  <text class="s" x="540" y="142">строка за строкой</text>
  <text class="l" x="540" y="178">потом ниже</text>
  <text class="s" x="540" y="200">тем же шагом</text>
  <text class="l" x="540" y="236">так — каждый scope</text>
  <text class="s" x="540" y="258">walls, beams, joists…</text>
</svg>
