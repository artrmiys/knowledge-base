<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Furring on CMU and under siding</title>
  <defs>
    <pattern id="cmu" width="48" height="34" patternUnits="userSpaceOnUse"><rect width="48" height="34" fill="#e9eef2"/><rect x="2" y="2" width="44" height="30" fill="none" stroke="#7d8e9b" stroke-width="1.3"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Furring — рейка/профиль с зазором</text>
  <text class="s" x="32" y="62">Z-metal на CMU под insulation · 1x4/2x4 P.T. под siding (rainscreen).</text>
  <!-- CMU -->
  <rect x="120" y="100" width="120" height="160" fill="url(#cmu)" stroke="#3a3a3a" stroke-width="1.6"/>
  <!-- Z furring marks -->
  <path d="M240,120 h14 v8 h-10 M240,180 h14 v8 h-10 M240,240 h14 v8 h-10" fill="none" stroke="#8a5a2a" stroke-width="2.4"/>
  <!-- furring strips under siding -->
  <rect x="380" y="100" width="14" height="160" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="430" y="100" width="14" height="160" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="480" y="100" width="14" height="160" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <line x1="252" y1="160" x2="560" y2="140" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="143">Z metal furring (на CMU)</text>
  <line x1="437" y1="180" x2="560" y2="200" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="568" y="203">Furring P.T. (под siding)</text>
</svg>
