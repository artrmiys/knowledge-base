<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Subfloor T and G on joists with adhesive</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <pattern id="tg" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#f6ead0"/><circle cx="4" cy="4" r="0.9" fill="#c89b5a"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Subfloor — 3/4" T&amp;G + panel adhesive</text>
  <text class="s" x="32" y="62">По умолчанию 3/4" T&amp;G; не забывай строку клея (29OZ) и FRT-периметр.</text>
  <!-- joists (ends) -->
  <g fill="url(#w)" stroke="#3a3a3a" stroke-width="1.4">
    <rect x="150" y="170" width="22" height="90"/><rect x="250" y="170" width="22" height="90"/>
    <rect x="350" y="170" width="22" height="90"/><rect x="450" y="170" width="22" height="90"/>
  </g>
  <!-- subfloor panel -->
  <rect x="130" y="140" width="380" height="30" fill="url(#tg)" stroke="#3a3a3a" stroke-width="1.6"/>
  <!-- adhesive beads -->
  <g fill="#2f7fd6"><circle cx="161" cy="168" r="3"/><circle cx="261" cy="168" r="3"/><circle cx="361" cy="168" r="3"/><circle cx="461" cy="168" r="3"/></g>
  <line x1="320" y1="150" x2="560" y2="140" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="568" y="143">3/4" T&amp;G subfloor</text>
  <line x1="361" y1="168" x2="560" y2="180" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="568" y="183">Panel adhesive (29OZ)</text>
  <line x1="261" y1="215" x2="560" y2="225" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="568" y="228">Joists</text>
</svg>
