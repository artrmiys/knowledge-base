<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Joist run, rim, and blocking diagram</title>
  <desc id="desc">Floor framing plan diagram showing joist run direction, rim board, blocking rows, beam support, and hanger checkpoints.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <style>
      .bg{fill:#f8faf8}.panel{fill:#fff;stroke:#d7e5d4;stroke-width:2}.wood{fill:#f1c27d;stroke:#8b5d25;stroke-width:2}
      .beam{fill:#c7d7ff;stroke:#425f9c;stroke-width:3}.rim{fill:#ffe0b2;stroke:#b56a00;stroke-width:3}
      .block{fill:#d9f2d8;stroke:#2e7d32;stroke-width:2}.label{font:600 18px Arial, sans-serif;fill:#1f2a1f}
      .small{font:14px Arial, sans-serif;fill:#374237}.rule{font:600 15px Arial, sans-serif;fill:#2e7d32}
      .line{stroke:#2e7d32;stroke-width:2;marker-end:url(#arrow)}.dim{stroke:#777;stroke-width:1.5;stroke-dasharray:5 5}
    </style>
  </defs>
  <rect class="bg" width="920" height="520" rx="16"/>
  <rect class="panel" x="36" y="34" width="848" height="452" rx="14"/>
  <text class="label" x="70" y="78">Joist run: do not restart spacing at inside beam</text>
  <text class="small" x="70" y="105">Track run direction, support, hangers, rim, and blocking as separate review items.</text>

  <rect class="rim" x="90" y="150" width="540" height="24"/>
  <rect class="rim" x="90" y="370" width="540" height="24"/>
  <rect class="beam" x="360" y="130" width="28" height="285"/>
  <text class="small" x="342" y="126">inside beam</text>

  <g>
    <rect class="wood" x="112" y="174" width="16" height="196"/>
    <rect class="wood" x="164" y="174" width="16" height="196"/>
    <rect class="wood" x="216" y="174" width="16" height="196"/>
    <rect class="wood" x="268" y="174" width="16" height="196"/>
    <rect class="wood" x="320" y="174" width="16" height="196"/>
    <rect class="wood" x="412" y="174" width="16" height="196"/>
    <rect class="wood" x="464" y="174" width="16" height="196"/>
    <rect class="wood" x="516" y="174" width="16" height="196"/>
    <rect class="wood" x="568" y="174" width="16" height="196"/>
  </g>

  <rect class="block" x="90" y="238" width="270" height="18"/>
  <rect class="block" x="388" y="238" width="242" height="18"/>
  <rect class="block" x="90" y="302" width="270" height="18"/>
  <rect class="block" x="388" y="302" width="242" height="18"/>

  <line class="dim" x1="112" y1="430" x2="164" y2="430"/>
  <line class="dim" x1="112" y1="422" x2="112" y2="438"/>
  <line class="dim" x1="164" y1="422" x2="164" y2="438"/>
  <text class="small" x="116" y="456">16&quot; o.c. typical factor 1.1</text>

  <line class="line" x1="690" y1="160" x2="630" y2="162"/>
  <text class="rule" x="710" y="165">Rim board</text>
  <text class="small" x="710" y="187">Keep LFT; do not split into 16 ft pieces.</text>

  <line class="line" x1="690" y1="232" x2="388" y2="206"/>
  <text class="rule" x="710" y="237">Hangers at supports</text>
  <text class="small" x="710" y="259">ITS up to 16&quot;; HIT for deeper joists.</text>

  <line class="line" x1="690" y1="304" x2="475" y2="312"/>
  <text class="rule" x="710" y="309">Blocking rows</text>
  <text class="small" x="710" y="331">Count separately from joists.</text>

  <line class="line" x1="690" y1="376" x2="382" y2="282"/>
  <text class="rule" x="710" y="381">Inside beam rule</text>
  <text class="small" x="710" y="403">Only remove joist if it lands on beam.</text>
</svg>
