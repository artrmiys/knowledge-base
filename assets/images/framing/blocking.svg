<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Blocking between joists</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}.j{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Blocking — короткие доски между joists/studs</text>
  <text class="s" x="32" y="62">Continuous — в LFT без factor. По шагу — см. Blocking o.c.</text>
  <!-- joists horizontal -->
  <rect x="120" y="110" width="500" height="22" class="j"/>
  <rect x="120" y="170" width="500" height="22" class="j"/>
  <rect x="120" y="230" width="500" height="22" class="j"/>
  <!-- blocking pieces between -->
  <rect x="250" y="132" width="22" height="38" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="250" y="192" width="22" height="38" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="430" y="132" width="22" height="38" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <rect x="430" y="192" width="22" height="38" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <line x1="272" y1="151" x2="630" y2="120" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="638" y="123">Blocking</text>
  <line x1="500" y1="121" x2="630" y2="180" stroke="#2e7d32" stroke-width="1.4"/>
  <text class="l" x="638" y="183">Joists</text>
</svg>
