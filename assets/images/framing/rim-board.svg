<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Rim board at joist ends on top plate</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}.b{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Rim board — закрывает торцы joists по краю</text>
  <text class="s" x="32" y="62">LFT по периметру; factor 1.05 (EWP) / 1.1 (прочее). Нужен и at roof TJI.</text>
  <!-- wall + plate -->
  <rect x="120" y="210" width="420" height="40" fill="url(#w)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- joists (ends) -->
  <rect x="200" y="120" width="22" height="90" class="b"/>
  <rect x="270" y="120" width="22" height="90" class="b"/>
  <rect x="340" y="120" width="22" height="90" class="b"/>
  <rect x="410" y="120" width="22" height="90" class="b"/>
  <!-- rim board on edge -->
  <rect x="160" y="120" width="14" height="90" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.8"/>
  <line x1="167" y1="120" x2="600" y2="95" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="608" y="98">Rim board (LFT)</text>
  <line x1="289" y1="165" x2="600" y2="165" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="608" y="168">Joists</text>
  <line x1="330" y1="230" x2="600" y2="235" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="608" y="238">Top plate / wall</text>
</svg>
