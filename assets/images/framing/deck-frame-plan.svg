<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Deck framing plan: ledger, beam, posts, joists</title>
  <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}</style>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Deck / Porch / Balcony — каркас (план)</text>
  <text class="s" x="32" y="62">Ledger к зданию · beam на posts · joists между. Hangers/bolts по детали.</text>
  <!-- building wall -->
  <rect x="100" y="90" width="420" height="14" fill="#7c8a96"/>
  <text class="s" x="100" y="84">building</text>
  <!-- ledger -->
  <rect x="100" y="104" width="420" height="12" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.4"/>
  <!-- joists -->
  <g fill="#f2d6a8" stroke="#3a3a3a" stroke-width="1.2">
    <rect x="120" y="116" width="10" height="130"/><rect x="180" y="116" width="10" height="130"/><rect x="240" y="116" width="10" height="130"/>
    <rect x="300" y="116" width="10" height="130"/><rect x="360" y="116" width="10" height="130"/><rect x="420" y="116" width="10" height="130"/><rect x="480" y="116" width="10" height="130"/>
  </g>
  <!-- beam at outer edge -->
  <rect x="100" y="234" width="420" height="14" fill="#caa27b" stroke="#6c4b2a" stroke-width="1.6"/>
  <!-- posts -->
  <rect x="130" y="248" width="20" height="20" fill="#8a6a3a"/><rect x="300" y="248" width="20" height="20" fill="#8a6a3a"/><rect x="470" y="248" width="20" height="20" fill="#8a6a3a"/>
  <line x1="300" y1="110" x2="560" y2="105" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="108">Ledger (к зданию)</text>
  <line x1="300" y1="180" x2="560" y2="170" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="173">Joists + hangers</text>
  <line x1="300" y1="241" x2="560" y2="240" stroke="#2f7fd6" stroke-width="1.4"/><text class="l" x="568" y="243">Beam + posts</text>
</svg>
