<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Beam length is support to support; round to 2 feet</title>
  <style>
    .t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
    .s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}
    .l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2e7d32}
    .b{font:700 13px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}
    .dim{font:600 12px "Segoe UI",Arial,sans-serif;fill:#2e7d32}
  </style>
  <defs>
    <marker id="da" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
    <marker id="db" markerWidth="9" markerHeight="9" refX="3" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="38">Beam: длина и округление</text>
  <text class="s" x="32" y="60">Длину бери от опоры до опоры (support to support), а не по линии на плане.</text>

  <!-- supports (posts) -->
  <rect x="90" y="150" width="22" height="70" fill="#cdd8cd" stroke="#3a3a3a" stroke-width="1.4"/>
  <rect x="408" y="150" width="22" height="70" fill="#cdd8cd" stroke="#3a3a3a" stroke-width="1.4"/>
  <text class="s" x="84" y="238">support</text>
  <text class="s" x="402" y="238">support</text>

  <!-- beam -->
  <rect x="90" y="132" width="340" height="18" fill="#3a3a3a"/>
  <text class="b" x="230" y="124">Beam</text>

  <!-- span dimension -->
  <line x1="101" y1="262" x2="419" y2="262" stroke="#2e7d32" stroke-width="2" marker-start="url(#db)" marker-end="url(#da)"/>
  <text class="dim" x="210" y="282">span = длина балки</text>

  <!-- rules -->
  <text class="b" x="500" y="138">≥ 8'  →  округлять до 2'</text>
  <text class="s" x="500" y="160">8.4' → 10', 11.2' → 12'</text>
  <text class="b" x="500" y="200">&lt; 8'  →  без округления</text>
  <text class="s" x="500" y="222">мелкие beams оставляем как есть</text>
</svg>
