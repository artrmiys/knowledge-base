<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Corner stud assembly plan view</title>
  <defs>
    <pattern id="w" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="10" height="10" fill="#f2d6a8"/><line x1="0" y1="0" x2="0" y2="10" stroke="#c89b5a" stroke-width="1"/></pattern>
    <style>.t{font:700 19px "Segoe UI",Arial,sans-serif;fill:#1f2a1f}.s{font:400 13px "Segoe UI",Arial,sans-serif;fill:#5a6a5a}.l{font:600 13px "Segoe UI",Arial,sans-serif;fill:#2f7fd6}.st{stroke:#3a3a3a;stroke-width:1.5;fill:url(#w)}</style>
  </defs>
  <rect width="760" height="300" fill="#fff"/>
  <text class="t" x="32" y="40">Corner — сборка стоек на стыке стен (план)</text>
  <text class="s" x="32" y="62">Stick — считаем отдельно по этажам. Panels — угол уже включён.</text>
  <!-- L-corner studs (plan) -->
  <rect x="160" y="120" width="40" height="40" class="st"/>
  <rect x="200" y="120" width="40" height="40" class="st"/>
  <rect x="160" y="160" width="40" height="40" class="st"/>
  <rect x="160" y="200" width="40" height="40" class="st"/>
  <!-- wall runs (light) -->
  <rect x="240" y="120" width="200" height="40" fill="#f1ead8" stroke="#c89b5a" stroke-width="1.2"/>
  <rect x="160" y="240" width="40" height="20" fill="#f1ead8" stroke="#c89b5a" stroke-width="1.2"/>
  <line x1="200" y1="140" x2="540" y2="130" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="548" y="133">Corner studs (2–3 stud)</text>
  <line x1="340" y1="140" x2="540" y2="175" stroke="#2f7fd6" stroke-width="1.4"/>
  <text class="l" x="548" y="178">Wall run</text>
</svg>
